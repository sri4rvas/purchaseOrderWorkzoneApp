_schema-version: '3.1'
ID: PurchaseOrder
version: 1.0.0
description: A simple CAP project. (BTP Work Zone / Managed Approuter enabled)
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production
        - node fix-engines.js

modules:
  # ------------------------------------------------------------------
  # CAP service (OData backend)
  # ------------------------------------------------------------------
  - name: PurchaseOrder-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: '${default-url}'
    requires:
      - name: hdi_PurchaseOrder_db
      - name: PurchaseOrder-xsuaa

  # ------------------------------------------------------------------
  # HANA HDI deployer
  # ------------------------------------------------------------------
  - name: hdi_PurchaseOrder_db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: hdi_PurchaseOrder_db

  # ------------------------------------------------------------------
  # Fiori Elements UI built as an HTML5 application (no standalone
  # approuter). It is served by the SAP-managed approuter that comes
  # with SAP Build Work Zone.
  # ------------------------------------------------------------------
  - name: purchaseorderapp
    type: html5
    path: app/purchaseorderapp
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install --include=dev
        - npm run build:cf
      supported-platforms: []

  # ------------------------------------------------------------------
  # Uploads the built HTML5 app(s) into the HTML5 Application Repository
  # (app-host). Work Zone reads the apps from here.
  # ------------------------------------------------------------------
  - name: PurchaseOrder-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: PurchaseOrder-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - purchaseorderapp.zip
          name: purchaseorderapp
          target-path: resources/

  # ------------------------------------------------------------------
  # Creates the sub-account destinations the managed approuter / Work
  # Zone need to discover the app-host and the XSUAA instance.
  # ------------------------------------------------------------------
  - name: PurchaseOrder-destination-content
    type: com.sap.application.content
    requires:
      - name: PurchaseOrder-xsuaa
        parameters:
          service-key:
            name: PurchaseOrder-xsuaa-key
      - name: PurchaseOrder-html5-repo-host
        parameters:
          service-key:
            name: PurchaseOrder-html5-repo-host-key
      - name: srv-api
      - name: PurchaseOrder-destination-service
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: PurchaseOrder_html_repo_host
              ServiceInstanceName: PurchaseOrder-html5-repo-host
              ServiceKeyName: PurchaseOrder-html5-repo-host-key
              sap.cloud.service: purchaseorder.service
            - Name: PurchaseOrder_uaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: PurchaseOrder-xsuaa
              ServiceKeyName: PurchaseOrder-xsuaa-key
              sap.cloud.service: purchaseorder.service
            # Backend OData service: the user's (IAS) token is exchanged via
            # PurchaseOrder-xsuaa so the issued token's audience matches the
            # CAP backend (sb-PurchaseOrder!t...). No raw token forwarding.
            - Name: srv-api
              URL: ~{srv-api/srv-url}
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: PurchaseOrder-xsuaa
              ServiceKeyName: PurchaseOrder-xsuaa-key
              HTML5.DynamicDestination: true
              HTML5.Timeout: 60000
              sap.cloud.service: purchaseorder.service

resources:
  # ------------------------------------------------------------------
  - name: hdi_PurchaseOrder_db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      config:
        schema: PurchaseOrder
        

  - name: PurchaseOrder-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: PurchaseOrder
        tenant-mode: dedicated

  - name: PurchaseOrder-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: PurchaseOrder-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                Description: SAPUI5
                Type: HTTP
                URL: https://ui5.sap.com
                ProxyType: Internet
                Authentication: NoAuthentication
